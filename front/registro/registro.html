<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPlay LogIn</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <h1>RetroPlay</h1>
    <div class="formulario">
        <h2>Crear una cuenta</h2>
        <form method="post">
            <!--Al tener "campo" en común se puede aplicar el css a ambas-->
            <div class="nombre campo">
                <input type="text" placeholder="Usuario" required>
            </div>
            <div class="apellidos campo">
                <input type="text" placeholder="Apellidos" required>   
            </div>
            <div class="correo campo">
                <input type="text" placeholder="Correo" required>   
            </div>
            <div class="telefono campo">
                <input type="password" placeholder="Teléfono" required>   
            </div>
            <input type="submit" value="Insertar">
        </form>
</body>
</html>
